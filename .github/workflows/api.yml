name: Commit to API
on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 21 * * MON'
  workflow_dispatch:
    inputs:
      providers:
        description: 'Provider IDs (comma-separated)'
        required: false
        default: 'all'
jobs:
  push_to_api:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current
        uses: actions/checkout@v2
        with:
          submodules: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.7
          bundler-cache: true
      - name: Update providers
        env:
          API_PROVIDERS_MANUAL: ${{ github.event.inputs.providers }}
          API_PROVIDERS: ${{ secrets.API_PROVIDERS }}
        run: |
          if [[ -n "$API_PROVIDERS_MANUAL" ]]; then
            export API_PROVIDERS="$API_PROVIDERS_MANUAL"
          fi
          ./generate.sh --providers "$API_PROVIDERS"
      - name: Deploy
        uses: tagus/git-deploy@v0.3.2
        with:
          changes: gen
          repository: git@github.com:passepartoutvpn/api.git
          ssh_key: ${{ secrets.API_DEPLOY_KEY }}
          name: keeshux
          email: keeshux@gmail.com
